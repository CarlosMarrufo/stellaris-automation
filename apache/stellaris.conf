# /etc/apache2/sites-available/stellaris.conf
#
# Configuración Apache 2.4 — Stellaris Automation
# Módulos requeridos (habilitar con a2enmod):
#   proxy  proxy_http  rewrite  ssl  headers
#
# Ajustar:
#   - ServerName / ServerAlias con el dominio real
#   - DocumentRoot con la ruta real del build de Vite
#   - Rutas de certificados SSL (las genera certbot automáticamente)

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName  stellarisautomation.com
    ServerAlias www.stellarisautomation.com

    # Redirigir todo el tráfico HTTP a HTTPS (301 permanente)
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS principal ───────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  stellarisautomation.com
    ServerAlias www.stellarisautomation.com

    # ── Frontend (Vite build) ─────────────────────────────────────────────────
    DocumentRoot /var/www/stellaris/stellaris-automation/dist

    <Directory /var/www/stellaris/stellaris-automation/dist>
        Options       -Indexes -ExecCGI +FollowSymLinks
        AllowOverride None
        Require       all granted

        # SPA client-side routing:
        # Cualquier ruta que no sea un archivo o directorio real
        # devuelve index.html para que React Router la procese.
        RewriteEngine On
        RewriteBase   /
        RewriteRule   ^index\.html$  -  [L]
        RewriteCond   %{REQUEST_FILENAME}  !-f
        RewriteCond   %{REQUEST_FILENAME}  !-d
        RewriteRule   .  /index.html  [L]
    </Directory>

    # Assets estáticos con Vite: hash en el nombre → cache agresivo (1 año).
    <LocationMatch "\.(js|css|woff2?|ttf|eot|png|jpg|jpeg|webp|svg|ico|gif)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # HTML: nunca cachear (contiene hash references que cambian en cada build).
    <LocationMatch "\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </LocationMatch>

    # ── API Reverse Proxy → Node.js (puerto 4000) ─────────────────────────────
    # El servidor Node.js escucha SOLO en 127.0.0.1:4000 (loopback).
    # Apache es el único que puede alcanzarlo; el puerto 4000 nunca es público.

    ProxyRequests    Off
    ProxyPreserveHost On

    ProxyPass        /api/  http://127.0.0.1:4000/api/
    ProxyPassReverse /api/  http://127.0.0.1:4000/api/

    # Pasar el IP real del cliente a Express (usado por express-rate-limit).
    RequestHeader set X-Forwarded-For  "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # Timeouts para el proxy (ms → segundos en Apache son directas en segundos)
    ProxyTimeout 30

    # ── SSL ───────────────────────────────────────────────────────────────────
    SSLEngine on

    # Certbot gestiona estos archivos automáticamente con Let's Encrypt.
    SSLCertificateFile    /etc/letsencrypt/live/stellarisautomation.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/stellarisautomation.com/privkey.pem

    # Mozilla SSL Configuration Generator — Intermediate profile
    # https://ssl-config.mozilla.org/
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # ── Cabeceras de seguridad HTTP ───────────────────────────────────────────
    Header always set Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options     "nosniff"
    Header always set X-Frame-Options            "DENY"
    Header always set Referrer-Policy            "strict-origin-when-cross-origin"
    Header always set Permissions-Policy         "camera=(), microphone=(), geolocation=()"

    # ── Logs ──────────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/stellaris_error.log
    CustomLog ${APACHE_LOG_DIR}/stellaris_access.log combined

</VirtualHost>
